<!DOCTYPE html>
<html>
<head>
    <title>Force Reset API URL</title>
</head>
<body>
    <h1>Force Reset API URL and Test</h1>
    <div id="results"></div>
    
    <script>
        // Force clear everything
        console.log('🔧 Force resetting...');
        
        // Clear all storage
        localStorage.clear();
        sessionStorage.clear();
        
        // Set correct API URL
        localStorage.setItem('apiBaseUrl', 'http://localhost:3000/api');
        
        // Clear any cookies
        document.cookie.split(";").forEach(function(c) { 
            document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
        });
        
        console.log('✅ Storage cleared and API URL set to:', localStorage.getItem('apiBaseUrl'));
        
        // Test immediate connection
        async function testConnection() {
            const resultsDiv = document.getElementById('results');
            
            try {
                console.log('🧪 Testing connection...');
                
                const response = await fetch('http://localhost:3000/api/test');
                const data = await response.json();
                
                resultsDiv.innerHTML = `
                    <div class="success">
                        <h3>✅ Connection Successful!</h3>
                        <p><strong>Backend Response:</strong> ${data.message}</p>
                        <p><strong>API URL Set:</strong> ${localStorage.getItem('apiBaseUrl')}</p>
                        <p><strong>Redirecting to admin login in 3 seconds...</strong></p>
                    </div>
                `;
                
                console.log('✅ Connection test successful:', data);
                
                // Redirect to admin login
                setTimeout(() => {
                    window.location.href = '/admin/login';
                }, 3000);
                
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Connection Failed</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>API URL:</strong> ${localStorage.getItem('apiBaseUrl')}</p>
                        <p><strong>Check if backend is running on port 3000</strong></p>
                    </div>
                `;
                
                console.error('❌ Connection test failed:', error);
            }
        }
        
        // Run test
        testConnection();
    </script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</body>
</html>
