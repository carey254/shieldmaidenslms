<!DOCTYPE html>
<html>
<head>
    <title>Final Login Test - Both Email Versions</title>
</head>
<body>
    <h1>🔐 Final Login Test</h1>
    
    <div class="test-section">
        <h2>Test 1: instructor@shieldmaidens.org (without "the")</h2>
        <button onclick="testLogin('instructor@shieldmaidens.org', 'instructor123')">Test Without "the"</button>
        <div id="result1"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 2: instructor@theshieldmaidens.org (with "the")</h2>
        <button onclick="testLogin('instructor@theshieldmaidens.org', 'instructor123')">Test With "the"</button>
        <div id="result2"></div>
    </div>
    
    <script>
        async function testLogin(email, password) {
            const resultId = email.includes('theshieldmaidens') ? 'result2' : 'result1';
            const resultDiv = document.getElementById(resultId);
            
            resultDiv.innerHTML = '<p>🧪 Testing...</p>';
            
            try {
                const response = await fetch('http://localhost:3004/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h4>✅ SUCCESS!</h4>
                            <p><strong>User:</strong> ${data.user.name}</p>
                            <p><strong>Role:</strong> ${data.user.is_instructor ? 'Instructor' : 'Other'}</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h4>❌ FAILED</h4>
                            <p><strong>Error:</strong> ${data.message}</p>
                        </div>
                    `;
                }
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ NETWORK ERROR</h4>
                        <p><strong>Error:</strong> ${error.message}</p>
                    </div>
                `;
            }
        }
    </script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .test-section {
            background: #f8f9fa;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
            border-left: 4px solid #007bff;
        }
        .test-section h2 {
            margin: 0 0 10px 0;
            color: #007bff;
        }
        button {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover {
            background: #218838;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</body>
</html>
