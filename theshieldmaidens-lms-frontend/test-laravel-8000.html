<!DOCTYPE html>
<html>
<head>
    <title>Test Laravel Backend - Port 8000</title>
</head>
<body>
    <h1>🧪 Test Laravel Backend - Port 8000</h1>
    
    <button onclick="testLogin()">Test Instructor Login</button>
    <div id="result"></div>
    
    <script>
        async function testLogin() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>🧪 Testing Laravel login on port 8000...</p>';
            
            try {
                const response = await fetch('http://localhost:8000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ 
                        email: 'instructor@theshieldmaidens.org', 
                        password: 'instructor123' 
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ Laravel Login Successful!</h3>
                            <p><strong>User:</strong> ${data.user?.name || 'Unknown'}</p>
                            <p><strong>Email:</strong> ${data.user?.email || 'Unknown'}</p>
                            <p><strong>Token:</strong> ${data.access_token ? 'Received' : 'Not received'}</p>
                            <p><strong>✅ Laravel backend is working!</strong></p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h3>❌ Laravel Login Failed</h3>
                            <p><strong>Status:</strong> ${response.status}</p>
                            <p><strong>Error:</strong> ${data.message || 'Unknown error'}</p>
                        </div>
                    `;
                }
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Network Error</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Make sure Laravel is running on port 8000</strong></p>
                    </div>
                `;
            }
        }
    </script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover {
            background: #218838;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</body>
</html>
