<!DOCTYPE html>
<html>
<head>
    <title>Force Reset API Port to 3004</title>
</head>
<body>
    <h1>🔄 Force Reset API Port to 3004</h1>
    
    <div class="status">
        <h2>Current Status:</h2>
        <div id="current-port"></div>
        <div id="current-token"></div>
    </div>
    
    <button onclick="forceReset()">🔄 Force Reset to Port 3004</button>
    <button onclick="testConnection()">🧪 Test Connection</button>
    <button onclick="goToLogin()">🔐 Go to Instructor Login</button>
    
    <div id="result"></div>
    
    <script>
        // Show current status
        function showStatus() {
            const currentPort = localStorage.getItem('apiBaseUrl');
            const currentToken = localStorage.getItem('token');
            
            document.getElementById('current-port').innerHTML = 
                `<strong>Current API Base URL:</strong> ${currentPort || 'Not set'}`;
            document.getElementById('current-token').innerHTML = 
                `<strong>Current Token:</strong> ${currentToken ? 'Set' : 'Not set'}`;
        }
        
        // Force reset to port 3004
        function forceReset() {
            const resultDiv = document.getElementById('result');
            
            // Clear all cache
            localStorage.clear();
            sessionStorage.clear();
            
            // Set correct port
            localStorage.setItem('apiBaseUrl', 'http://localhost:8000/api');
            
            resultDiv.innerHTML = `
                <div class="success">
                    <h3>✅ Force Reset Complete!</h3>
                    <p><strong>Cleared:</strong> All localStorage and sessionStorage</p>
                    <p><strong>Set:</strong> API Base URL to http://localhost:8000/api</p>
                    <p><strong>Next:</strong> Test connection, then go to login</p>
                </div>
            `;
            
            showStatus();
        }
        
        // Test connection
        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>🧪 Testing connection to Laravel on port 8000...</p>';
            
            try {
                const response = await fetch('http://localhost:8000/api/test');
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ Connection Successful!</h3>
                            <p><strong>Backend:</strong> Laravel working on port 8000</p>
                            <p><strong>Message:</strong> ${data.message}</p>
                            <p><strong>✅ Ready for login!</strong></p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h3>❌ Connection Failed</h3>
                            <p><strong>Status:</strong> ${response.status}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Network Error</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Make sure Laravel is running on port 8000</strong></p>
                    </div>
                `;
            }
        }
        
        // Go to login
        function goToLogin() {
            window.location.href = '/instructor/login';
        }
        
        // Initialize
        showStatus();
    </script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .status {
            background: #f8f9fa;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
            border-left: 4px solid #007bff;
        }
        button {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin: 10px 10px 10px 0;
        }
        button:hover {
            background: #218838;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</body>
</html>
