<!DOCTYPE html>
<html>
<head>
    <title>Quick Admin Login Test</title>
</head>
<body>
    <h1>🔐 Quick Admin Login Test</h1>
    
    <div class="form">
        <h3>Test Admin Login</h3>
        <input type="email" id="email" placeholder="Email" value="admin@theshieldmaidens.org" style="width: 300px; padding: 10px; margin: 5px;">
        <br>
        <input type="password" id="password" placeholder="Password" value="admin123" style="width: 300px; padding: 10px; margin: 5px;">
        <br>
        <button onclick="testAdminLogin()">🔐 Test Admin Login</button>
        <button onclick="testAllAdminCredentials()">🧪 Test All Admin Credentials</button>
    </div>
    
    <div id="result"></div>
    
    <script>
        // All possible admin credentials to test
        const adminCredentials = [
            { email: 'admin@theshieldmaidens.org', password: 'admin123', source: 'Laravel Seeder' },
            { email: 'admin@shieldmaidens.org', password: 'admin123', source: 'Old System' },
            { email: 'test@example.com', password: 'password', source: 'Test User' },
            { email: 'admin@theshieldmaidens.org', password: 'password', source: 'Test Variation' },
            { email: 'admin@theshieldmaidens.org', password: 'admin', source: 'Simple Password' }
        ];
        
        async function testAdminLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = '<p>🔐 Testing admin login...</p>';
            
            try {
                const response = await fetch('http://localhost:8000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ Admin Login Successful!</h3>
                            <p><strong>Email:</strong> ${email}</p>
                            <p><strong>Password:</strong> ${password}</p>
                            <p><strong>Name:</strong> ${data.user?.name || 'Unknown'}</p>
                            <p><strong>Role:</strong> ${data.user?.role || 'Unknown'}</p>
                            <p><strong>Is Admin:</strong> ${data.user?.is_admin ? 'Yes' : 'No'}</p>
                            <p><strong>Token:</strong> ${data.access_token ? 'Received' : 'Not received'}</p>
                            <p><strong>✅ This credential works!</strong></p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h3>❌ Admin Login Failed</h3>
                            <p><strong>Email:</strong> ${email}</p>
                            <p><strong>Password:</strong> ${password}</p>
                            <p><strong>Status:</strong> ${response.status}</p>
                            <p><strong>Error:</strong> ${data.message || 'Unknown error'}</p>
                            <p><strong>Try different credentials below!</strong></p>
                        </div>
                    `;
                }
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>🔥 Network Error</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Is Laravel running on port 8000?</strong></p>
                    </div>
                `;
            }
        }
        
        async function testAllAdminCredentials() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>🧪 Testing all admin credentials...</p>';
            
            let results = [];
            
            for (const cred of adminCredentials) {
                try {
                    const response = await fetch('http://localhost:8000/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({ 
                            email: cred.email, 
                            password: cred.password 
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        results.push(`
                            <div class="success">
                                <h4>✅ ${cred.source}</h4>
                                <p><strong>Email:</strong> ${cred.email}</p>
                                <p><strong>Password:</strong> ${cred.password}</p>
                                <p><strong>Name:</strong> ${data.user?.name || 'Unknown'}</p>
                                <p><strong>Role:</strong> ${data.user?.role || 'Unknown'}</p>
                                <p><strong>🎯 USE THIS ONE!</strong></p>
                            </div>
                        `);
                    } else {
                        results.push(`
                            <div class="error">
                                <h4>❌ ${cred.source}</h4>
                                <p><strong>Email:</strong> ${cred.email}</p>
                                <p><strong>Password:</strong> ${cred.password}</p>
                                <p><strong>Error:</strong> ${data.message || 'Unknown error'}</p>
                            </div>
                        `);
                    }
                } catch (error) {
                    results.push(`
                        <div class="error">
                            <h4>🔥 ${cred.source} - Network Error</h4>
                            <p><strong>Error:</strong> ${error.message}</p>
                        </div>
                    `);
                }
            }
            
            resultDiv.innerHTML = `
                <div class="summary">
                    <h3>🎯 Admin Credential Test Results:</h3>
                    ${results.join('')}
                </div>
            `;
        }
    </script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
        }
        .form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
        }
        button {
            background: #007bff;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin: 10px 10px 10px 0;
        }
        button:hover {
            background: #0056b3;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .summary {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
        }
    </style>
</body>
</html>
