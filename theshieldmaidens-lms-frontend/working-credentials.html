<!DOCTYPE html>
<html>
<head>
    <title>Working Credentials Test</title>
</head>
<body>
    <h1>🔐 Working Login Credentials</h1>
    
    <div class="credentials">
        <h2>✅ ADMIN LOGIN</h2>
        <p><strong>Email:</strong> admin@shieldmaidens.org</p>
        <p><strong>Password:</strong> admin123</p>
        <button onclick="testLogin('admin@shieldmaidens.org', 'admin123')">Test Admin Login</button>
    </div>
    
    <div class="credentials">
        <h2>✅ INSTRUCTOR LOGIN</h2>
        <p><strong>Email:</strong> instructor@shieldmaidens.org</p>
        <p><strong>Password:</strong> instructor123</p>
        <button onclick="testLogin('instructor@shieldmaidens.org', 'instructor123')">Test Instructor Login</button>
    </div>
    
    <div class="credentials">
        <h2>✅ STUDENT LOGIN</h2>
        <p><strong>Email:</strong> student@shieldmaidens.org</p>
        <p><strong>Password:</strong> student123</p>
        <button onclick="testLogin('student@shieldmaidens.org', 'student123')">Test Student Login</button>
    </div>
    
    <div id="results"></div>
    
    <script>
        async function testLogin(email, password) {
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.innerHTML = `<p>🧪 Testing ${email}...</p>`;
            
            try {
                const response = await fetch('http://localhost:3001/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultsDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ Login Successful!</h3>
                            <p><strong>User:</strong> ${data.user.name}</p>
                            <p><strong>Email:</strong> ${data.user.email}</p>
                            <p><strong>Admin:</strong> ${data.user.is_admin}</p>
                            <p><strong>Instructor:</strong> ${data.user.is_instructor}</p>
                            <p><strong>Token:</strong> ${data.access_token.substring(0, 30)}...</p>
                            <p><strong>Now try the same credentials in the Vue app!</strong></p>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = `
                        <div class="error">
                            <h3>❌ Login Failed</h3>
                            <p><strong>Error:</strong> ${data.message}</p>
                        </div>
                    `;
                }
                
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Network Error</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                    </div>
                `;
            }
        }
    </script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .credentials {
            background: #f8f9fa;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
            border-left: 4px solid #007bff;
        }
        .credentials h2 {
            margin: 0 0 10px 0;
            color: #007bff;
        }
        .credentials p {
            margin: 5px 0;
            font-family: monospace;
            background: #e9ecef;
            padding: 5px;
            border-radius: 3px;
        }
        button {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #218838;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</body>
</html>
