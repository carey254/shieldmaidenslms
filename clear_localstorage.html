<!DOCTYPE html>
<html>
<head>
    <title>Clear LocalStorage</title>
</head>
<body>
    <h1>Clearing LocalStorage</h1>
    <button onclick="clearAll()">Clear All</button>
    <button onclick="showStorage()">Show Storage</button>
    <pre id="output"></pre>
    
    <script>
        function clearAll() {
            localStorage.clear();
            sessionStorage.clear();
            document.getElementById('output').textContent = 'All storage cleared!';
        }
        
        function showStorage() {
            const output = {
                localStorage: {},
                sessionStorage: {}
            };
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                output.localStorage[key] = localStorage.getItem(key);
            }
            
            for (let i = 0; i < sessionStorage.length; i++) {
                const key = sessionStorage.key(i);
                output.sessionStorage[key] = sessionStorage.getItem(key);
            }
            
            document.getElementById('output').textContent = JSON.stringify(output, null, 2);
        }
    </script>
</body>
</html>
