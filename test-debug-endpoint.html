<!DOCTYPE html>
<html>
<head>
    <title>Test Debug Endpoint</title>
</head>
<body>
    <h1>Test Debug Login Endpoint</h1>
    <button onclick="testDebugEndpoint()">Test Debug</button>
    <div id="result"></div>

    <script>
        async function testDebugEndpoint() {
            const resultDiv = document.getElementById('result');
            
            try {
                console.log('Testing debug endpoint...');
                
                const response = await fetch('http://localhost:8000/api/debug-login', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <h3>Debug Endpoint Response</h3>
                    <p><strong>Status:</strong> ${response.status}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                
                console.log('Debug response:', data);
            } catch (error) {
                resultDiv.innerHTML = `
                    <h3>Error</h3>
                    <p>${error.message}</p>
                `;
                console.error('Debug error:', error);
            }
        }
    </script>
</body>
</html>
