<!DOCTYPE html>
<html>
<head>
    <title>Clear Storage and Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { margin: 10px; padding: 10px 20px; background: #dc3545; color: white; border: none; cursor: pointer; }
        button.test { background: #007bff; }
        button:hover { opacity: 0.8; }
        .result { margin-top: 20px; padding: 10px; border: 1px solid #ddd; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Clear Storage and Test</h1>
    
    <h3>Step 1: Clear Storage</h3>
    <button onclick="clearStorage()">Clear All Storage</button>
    <button onclick="showStorage()">Show Current Storage</button>
    
    <h3>Step 2: Test API</h3>
    <button onclick="testLogin()" class="test">Test Admin Login</button>
    <button onclick="testDebug()" class="test">Test Debug</button>
    
    <div id="storage" class="result"></div>
    <div id="result" class="result"></div>

    <script>
        function clearStorage() {
            localStorage.clear();
            document.getElementById('storage').innerHTML = '<div class="success">✅ Storage cleared!</div>';
            document.getElementById('result').innerHTML = '';
        }
        
        function showStorage() {
            const storage = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                storage[key] = localStorage.getItem(key);
            }
            
            document.getElementById('storage').innerHTML = `
                <h3>Current Storage:</h3>
                <pre>${JSON.stringify(storage, null, 2)}</pre>
            `;
        }
        
        async function testLogin() {
            const resultDiv = document.getElementById('result');
            
            // Set correct API URL
            localStorage.setItem('apiBaseUrl', 'http://localhost:8000/api');
            
            try {
                console.log('Testing admin login...');
                
                const response = await fetch('http://localhost:8000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: JSON.stringify({
                        email: 'admin@theshieldmaidens.org',
                        password: 'admin123'
                    })
                });
                
                console.log('Response status:', response.status);
                
                const data = await response.json();
                
                if (response.ok && data.access_token) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ Admin Login Successful!</h3>
                            <p><strong>Status:</strong> ${response.status}</p>
                            <p><strong>User:</strong> ${data.user?.name} (${data.user?.role})</p>
                            <p><strong>Admin:</strong> ${data.user?.is_admin ? 'Yes' : 'No'}</p>
                            <p><strong>Token:</strong> ${data.access_token?.substring(0, 20)}...</p>
                            <p><strong>Message:</strong> ${data.message}</p>
                        </div>
                    `;
                    console.log('Admin login successful!', data);
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h3>❌ Admin Login Failed</h3>
                            <p><strong>Status:</strong> ${response.status}</p>
                            <p><strong>Message:</strong> ${data.message || 'Unknown error'}</p>
                            <p><strong>Response:</strong></p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                    console.log('Admin login failed:', data);
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Admin Login Error</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>URL being called:</strong> http://localhost:8000/api/login</p>
                    </div>
                `;
                console.error('Admin login error:', error);
            }
        }
        
        async function testDebug() {
            const resultDiv = document.getElementById('result');
            
            try {
                const response = await fetch('http://localhost:8000/api/debug-login');
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <h3>Debug Response</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<p>Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
